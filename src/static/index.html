<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mini RAG Chat</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container {
            width: min(100%, 900px);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(20, 20, 60, .08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 520px;
            height: min(80vh, 420px);
            max-height: 100vh;
            margin: auto;
        }
        
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #ddd;
            background: #000;
            color: #fff;
        }
        
        .messages {
            flex: 1;
            padding: 16px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 12px
        }
        
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.4
        }
        
        .me {
            align-self: flex-end;
            background: #e0f2fe;
            color: #042047;
            border-bottom-right-radius: 4px
        }
        
        .bot {
            align-self: flex-start;
            background: #f1f5f9;
            color: #041022;
            border-bottom-left-radius: 4px
        }
        
        .footer {
            padding: 12px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px
        }
        
        input[type=text] {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #d6d9e6;
            font-size: 16px;
            line-height: 1.5;
        }
        
        button {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:disabled {
            opacity: .6
        }
        
        .meta {
            font-size: 12px;
            color: #6b7280
        }
        
        .loading {
            display: none;
            margin-left: 8px
        }
        /* Responsive adjustments */

        @media (max-width: 720px) {
            body {
                padding: 8px;
            }

            .container {
                max-width: 100%;
                height: calc(100vh - 16px);
                border-radius: 0;
                box-shadow: none;
                margin: 0;
            }

            .header {
                padding: 14px;
            }

            .messages {
                padding: 12px;
            }

            .message {
                max-width: 100%;
            }

            input[type=text] {
                padding: 10px;
            }
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 900px;
            }
        }
    </style>
</head>

<body>
    <div class="container" role="main">
        <div class="header" style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
            <div>
                <strong>Medical AI Assistant</strong>
                
            </div>
            <!-- Project selector removed; using default project ID -->
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="footer">
            <input id="input" type="text" placeholder="Ask something Please." autocomplete="off" />
            <button id="send-btn" type="submit">Send</button>
            <span id="loading" class="loading">⏳</span>
        </form>
    </div>

    <script>
        // Using fixed default project ID
        const PROJECT_ID = '1';
        const API_PATH = `/api/v1/nlp/rag/answer/${PROJECT_ID}`;

        const messagesEl = document.getElementById('messages');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const loadingEl = document.getElementById('loading');

        function appendMessage(who, text) {
            const el = document.createElement('div');
            el.className = 'message ' + (who === 'me' ? 'me' : 'bot');
            el.textContent = text;
            messagesEl.appendChild(el);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        form.addEventListener('submit', async(e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            appendMessage('me', text);
            input.value = '';
            loadingEl.style.display = 'inline-block';
            sendBtn.disabled = true;

            try {
                const res = await fetch(API_PATH, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text,
                        limit: 5
                    })
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok && (data.signal === 'Answer Success' || data.signal === 'RAG_ANSWER_SUCCESS' || data.answer)) {
                    const answer = (typeof data.answer === 'string') ? data.answer : JSON.stringify(data.answer || data);
                    appendMessage('bot', answer);
                } else {
                    const msg = data && data.signal ? data.signal : `HTTP ${res.status}`;
                    appendMessage('bot', 'Error: ' + msg);
                }

            } catch (err) {
                appendMessage('bot', 'Error: ' + err.message);
            } finally {
                loadingEl.style.display = 'none';
                sendBtn.disabled = false;
            }
        });

        // show a starter message
        appendMessage('bot', 'Hello — ask a question and I TRY To Find The Answer!');

        // Project setter removed — using default project only
    </script>
</body>

</html>
